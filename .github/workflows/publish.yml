# Publish to PyPI on GitHub Release

# Setup (one-time): PyPI → Publishing → Trusted publishers
#   PyPI Project Name: agent-atlas-cli
#   Owner: batu3384  Repo: agent-atlas  Workflow: publish.yml  Environment: pypi

name: publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check version matches release tag
        run: |
          python - <<'PY'
          import os, pathlib, re, tomllib
          tag = os.environ.get("GITHUB_REF_NAME", "")
          assert tag.startswith("v"), f"expected tag vX.Y.Z, got {tag!r}"
          expected = tag[1:]
          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          ver = data["project"]["version"]
          assert ver == expected, f"pyproject version {ver} != tag {expected}"
          init = pathlib.Path("agent_atlas/__init__.py").read_text()
          m = re.search(r'__version__\s*=\s*"([^"]+)"', init)
          assert m and m.group(1) == expected, f"__version__ mismatch"
          print("version OK", expected)
          PY

      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
